apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hackathon-ingress
  namespace: default
  annotations:
    # For AWS ALB Ingress Controller:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: YOUR_ACM_CERT_ARN
    # For GKE Ingress, remove the above and use:
    # kubernetes.io/ingress.class: gce
spec:
  rules:
    - host: api.your-hackathon.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hackathon-backend-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hackathon-frontend-svc
                port:
                  number: 80
