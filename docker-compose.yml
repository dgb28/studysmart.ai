services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hackathon-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hackathon}
    # Host 5433 avoids conflict with a local Postgres (or other app) on 5432.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hackathon-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackathon-backend
    env_file: .env
    # Host must be the Compose service name; password special chars handled in app via POSTGRES_* + quote_plus.
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hackathon-frontend
    env_file: .env
    environment:
      - WATCHPACK_POLLING=true
      # Browser runs on host — must use localhost, not backend:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    # Bind mount hides image node_modules; anonymous volume can stay stale after new deps.
    # Install on start so package.json / lock changes (e.g. framer-motion) always resolve.
    command: sh -c "npm install && npm run dev"



  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackathon-worker
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  # ── ChromaDB (vector store for RAG) ─────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: hackathon-chroma
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # ── RedisInsight (Redis UI) ──────────────────────────────────────────────────
  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: hackathon-redisinsight
    ports:
      - "8002:8001"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  default:
    name: hackathon-network
